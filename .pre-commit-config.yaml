repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict

  # Ruff - Python linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^apps/api/
      - id: ruff-format
        files: ^apps/api/

  # Biome - JavaScript/TypeScript linting and formatting
  - repo: local
    hooks:
      - id: biome
        name: biome
        entry: bash -c 'cd apps/web && pnpm biome check --write .'
        language: system
        files: ^apps/web/.*\.(js|ts|svelte|json)$
        pass_filenames: false

  # Pre-push hooks - CI/CD checks
  - repo: local
    hooks:
      # Frontend TypeScript/Svelte type checking
      - id: svelte-check
        name: svelte-check
        entry: bash -c 'cd apps/web && pnpm run check'
        language: system
        files: ^apps/web/.*\.(ts|svelte)$
        pass_filenames: false
        stages: [pre-push]

      # Frontend build verification
      - id: frontend-build
        name: frontend-build
        entry: bash -c 'cd apps/web && pnpm run build'
        language: system
        files: ^apps/web/
        pass_filenames: false
        stages: [pre-push]

      # Backend import check
      - id: backend-check
        name: backend-check
        entry: bash -c 'cd apps/api && uv run python -c "from app.main import app"'
        language: system
        files: ^apps/api/.*\.py$
        pass_filenames: false
        stages: [pre-push]
