services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - vandyguessr-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vandyguessr-network

volumes:
  mongodb_data:
  redis_data:

networks:
  vandyguessr-network:
    driver: bridge
