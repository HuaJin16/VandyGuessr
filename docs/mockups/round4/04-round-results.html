<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>VandyGuessr - Round Results</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rubik:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "jungle": "#2E933C",
                        "jungle-dark": "#236E2D",
                        "gold": "#F4C430",
                        "terrain": "#F5F2E9",
                        "charcoal": "#18181B",
                        "clay": "#D95D39",
                    },
                    fontFamily: {
                        "heading": ["Rubik", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    boxShadow: {
                        "hard": "4px 4px 0px 0px rgba(0,0,0,0.1)",
                        "hard-lg": "6px 6px 0px 0px rgba(0,0,0,0.15)",
                        "3d": "0 6px 0 #236E2D",
                    },
                },
            },
        }
    </script>
    <style>
        .btn-3d {
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-3d:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #236E2D;
        }
        .map-sepia {
            filter: sepia(0.25) contrast(1.05) saturate(0.85);
        }
        /* Standardized HUD Pill */
        .hud-pill {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        /* Dashed line between pins */
        .dashed-line {
            stroke-dasharray: 8, 6;
            animation: dash 0.5s linear forwards;
        }
        @keyframes dash {
            from { stroke-dashoffset: 100; }
            to { stroke-dashoffset: 0; }
        }
        /* Score pop animation */
        @keyframes scorePop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .score-pop {
            animation: scorePop 0.5s ease-out forwards;
        }
        /* Bottom sheet slide up */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .slide-up {
            animation: slideUp 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="font-body antialiased h-screen w-full overflow-hidden relative bg-terrain">

    <!-- Large Sepia Map Background (Top ~70%) -->
    <div class="absolute inset-0 z-0">
        <!-- Sepia-toned campus map -->
        <div class="absolute inset-0 map-sepia bg-[#E8E4D9]">
            <!-- Map texture overlay -->
            <div class="absolute inset-0" style="background-image: url('https://api.mapbox.com/styles/v1/mapbox/light-v11/static/-86.8025,36.1447,15.5,0/1200x800?access_token=pk.placeholder'); background-size: cover; background-position: center;"></div>
            <!-- Parchment texture overlay -->
            <div class="absolute inset-0" style="background: linear-gradient(135deg, rgba(245,242,233,0.3) 0%, rgba(232,228,217,0.5) 100%);"></div>
            <!-- Grid pattern for map feel -->
            <div class="absolute inset-0" style="background-image: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,0,0,0.03) 40px, rgba(0,0,0,0.03) 41px), repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.03) 40px, rgba(0,0,0,0.03) 41px);"></div>
        </div>

        <!-- SVG for dashed line between pins -->
        <svg class="absolute inset-0 w-full h-full z-10 pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none">
            <line
                x1="35" y1="40"
                x2="65" y2="35"
                stroke="#18181B"
                stroke-width="0.3"
                class="dashed-line"
                stroke-linecap="round"
            />
        </svg>

        <!-- User Guess Pin (Green) -->
        <div class="absolute left-[35%] top-[40%] -translate-x-1/2 -translate-y-full z-20">
            <div class="flex flex-col items-center">
                <div class="bg-white rounded-lg px-2 py-1 shadow-hard mb-1 text-xs font-semibold text-charcoal">
                    Your Guess
                </div>
                <span class="material-symbols-outlined text-jungle text-5xl drop-shadow-lg" style="font-variation-settings: 'FILL' 1;">location_on</span>
            </div>
        </div>

        <!-- Actual Location Pin (Gold Flag) -->
        <div class="absolute left-[65%] top-[35%] -translate-x-1/2 -translate-y-full z-20">
            <div class="flex flex-col items-center">
                <div class="bg-gold rounded-lg px-2 py-1 shadow-hard mb-1 text-xs font-bold text-charcoal">
                    Kirkland Hall
                </div>
                <span class="material-symbols-outlined text-gold text-5xl drop-shadow-lg" style="font-variation-settings: 'FILL' 1;">flag</span>
            </div>
        </div>

        <!-- Distance Label -->
        <div class="absolute left-1/2 top-[42%] -translate-x-1/2 z-20">
            <div class="bg-charcoal/90 text-white rounded-full px-4 py-1.5 shadow-hard">
                <span class="font-mono font-bold text-sm">125m</span>
            </div>
        </div>
    </div>

    <!-- Main UI Overlay -->
    <div class="relative z-30 h-full w-full flex flex-col justify-between p-6">

        <!-- Top: Standardized HUD Pill (same as gameplay) -->
        <div class="flex justify-center pt-2">
            <div class="hud-pill rounded-full px-2 py-2 shadow-hard flex items-center border border-white/50">
                <!-- Round -->
                <div class="flex items-center gap-2 px-4">
                    <span class="text-xs font-semibold uppercase tracking-wider text-charcoal/50">Round</span>
                    <span class="font-mono font-bold text-lg text-charcoal">3<span class="text-charcoal/40">/5</span></span>
                </div>

                <div class="w-px h-6 bg-gray-200"></div>

                <!-- Total Score -->
                <div class="flex items-center gap-2 px-4">
                    <span class="text-xs font-semibold uppercase tracking-wider text-charcoal/50">Total</span>
                    <span class="font-mono font-bold text-lg text-charcoal">9,350</span>
                </div>

                <div class="w-px h-6 bg-gray-200"></div>

                <!-- Time Taken -->
                <div class="flex items-center gap-2 px-4">
                    <span class="material-symbols-outlined text-jungle text-lg">check_circle</span>
                    <span class="font-mono font-bold text-lg text-jungle">00:47</span>
                </div>
            </div>
        </div>

        <!-- Spacer -->
        <div class="flex-1"></div>

        <!-- Bottom Sheet: Results Card -->
        <div class="slide-up bg-white rounded-t-3xl shadow-hard-lg -mx-6 -mb-6 px-8 pt-6 pb-8">

            <!-- Progress Dots -->
            <div class="flex justify-center gap-2 mb-6">
                <div class="w-3 h-3 rounded-full bg-jungle"></div>
                <div class="w-3 h-3 rounded-full bg-jungle"></div>
                <div class="w-3 h-3 rounded-full bg-gold ring-2 ring-gold/30"></div>
                <div class="w-3 h-3 rounded-full bg-gray-200"></div>
                <div class="w-3 h-3 rounded-full bg-gray-200"></div>
            </div>

            <!-- Score Display -->
            <div class="flex items-center justify-between mb-6">
                <div class="flex-1">
                    <p class="text-sm font-semibold text-charcoal/50 uppercase tracking-wider mb-1">Round Score</p>
                    <div class="flex items-baseline gap-3">
                        <span class="score-pop font-heading font-bold text-5xl text-jungle">4,850</span>
                        <span class="text-charcoal/40 font-mono text-lg">pts</span>
                    </div>
                </div>

                <!-- Medal/Rating -->
                <div class="flex flex-col items-center">
                    <div class="w-16 h-16 rounded-full bg-gold/20 flex items-center justify-center mb-1">
                        <span class="material-symbols-outlined text-gold text-4xl" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
                    </div>
                    <span class="text-xs font-bold text-gold uppercase tracking-wider">Excellent!</span>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="flex gap-4 mb-6">
                <div class="flex-1 bg-terrain rounded-xl p-4 text-center">
                    <p class="text-xs font-semibold text-charcoal/50 uppercase tracking-wider mb-1">Distance</p>
                    <p class="font-mono font-bold text-xl text-charcoal">125m</p>
                </div>
                <div class="flex-1 bg-terrain rounded-xl p-4 text-center">
                    <p class="text-xs font-semibold text-charcoal/50 uppercase tracking-wider mb-1">Time</p>
                    <p class="font-mono font-bold text-xl text-charcoal">00:47</p>
                </div>
                <div class="flex-1 bg-terrain rounded-xl p-4 text-center">
                    <p class="text-xs font-semibold text-charcoal/50 uppercase tracking-wider mb-1">Accuracy</p>
                    <p class="font-mono font-bold text-xl text-jungle">97%</p>
                </div>
            </div>

            <!-- Next Round Button -->
            <button class="btn-3d w-full bg-jungle hover:bg-jungle-dark text-white font-heading font-bold text-xl py-4 rounded-xl shadow-3d flex items-center justify-center gap-3 transition-colors">
                <span>Next Round</span>
                <span class="material-symbols-outlined text-2xl">arrow_forward</span>
            </button>
        </div>
    </div>

    <!-- Exit Button (Top Left) -->
    <div class="absolute top-6 left-6 z-40">
        <button class="w-11 h-11 bg-white/90 backdrop-blur-sm rounded-xl shadow-hard flex items-center justify-center text-charcoal hover:bg-white transition-colors">
            <span class="material-symbols-outlined text-xl">close</span>
        </button>
    </div>
</body>
</html>
