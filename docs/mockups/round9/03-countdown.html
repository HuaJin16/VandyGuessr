<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>VandyGuessr - Game Starting</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rubik:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "jungle": "#2E933C",
                        "jungle-dark": "#236E2D",
                        "gold": "#F4C430",
                        "terrain": "#F5F2E9",
                        "charcoal": "#18181B",
                        "clay": "#D95D39",
                    },
                    fontFamily: {
                        "heading": ["Rubik", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    boxShadow: {
                        "hard": "4px 4px 0px 0px rgba(0,0,0,0.1)",
                        "hard-lg": "6px 6px 0px 0px rgba(0,0,0,0.15)",
                    },
                },
            },
        }
    </script>
    <style>
        @keyframes countPulse {
            0% { transform: scale(0.3); opacity: 0; }
            40% { transform: scale(1.15); opacity: 1; }
            70% { transform: scale(0.95); }
            100% { transform: scale(1); opacity: 1; }
        }
        .count-pulse {
            animation: countPulse 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes ringExpand {
            0% { transform: scale(0.5); opacity: 0.6; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .ring-expand {
            animation: ringExpand 1s ease-out infinite;
        }
        @keyframes fadeInUp {
            0% { transform: translateY(10px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="font-body antialiased h-screen w-full overflow-hidden relative">

    <!-- Dimmed Lobby Background -->
    <div class="absolute inset-0 z-0">
        <div
            class="absolute inset-0 bg-cover bg-center blur-[24px] scale-110"
            style="background-image: url('https://images.unsplash.com/photo-1562774053-701939374585?q=80&w=2986&auto=format&fit=crop');"
        ></div>
        <div class="absolute inset-0 bg-terrain/80"></div>
    </div>

    <!-- Dark Overlay -->
    <div class="absolute inset-0 z-10 bg-charcoal/60 backdrop-blur-sm"></div>

    <!-- Countdown Content -->
    <div class="relative z-20 h-full w-full flex flex-col items-center justify-center">

        <!-- Countdown Number -->
        <div class="relative mb-8">
            <!-- Expanding Ring -->
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-32 h-32 sm:w-40 sm:h-40 rounded-full border-4 border-white/20 ring-expand"></div>
            </div>

            <!-- Number Circle -->
            <div class="count-pulse relative w-32 h-32 sm:w-40 sm:h-40 rounded-full bg-jungle flex items-center justify-center shadow-hard-lg">
                <span class="font-heading font-bold text-7xl sm:text-8xl text-white leading-none">3</span>
            </div>
        </div>

        <!-- Status Text -->
        <div class="fade-in-up text-center">
            <h2 class="font-heading font-bold text-2xl sm:text-3xl text-white mb-2">Game Starting</h2>
            <p class="text-white/60 text-sm sm:text-base">Get ready to guess!</p>
        </div>

        <!-- Player Avatars (who's playing) -->
        <div class="fade-in-up mt-8 flex items-center justify-center">
            <div class="glass-card rounded-2xl px-5 py-3 shadow-hard flex items-center gap-4 border border-white/50">
                <div class="flex -space-x-2">
                    <div class="w-9 h-9 rounded-full bg-gradient-to-br from-jungle to-jungle-dark flex items-center justify-center text-white text-xs font-bold ring-2 ring-white">JD</div>
                    <div class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center text-white text-xs font-bold ring-2 ring-white">SW</div>
                    <div class="w-9 h-9 rounded-full bg-gradient-to-br from-purple-500 to-purple-700 flex items-center justify-center text-white text-xs font-bold ring-2 ring-white">AC</div>
                </div>
                <div class="w-px h-6 bg-gray-200"></div>
                <span class="font-mono font-bold text-sm text-charcoal">3 players</span>
            </div>
        </div>
    </div>
</body>
</html>
