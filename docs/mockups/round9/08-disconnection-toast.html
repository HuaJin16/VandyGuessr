<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>VandyGuessr - Disconnection Notice</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rubik:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "jungle": "#2E933C",
                        "jungle-dark": "#236E2D",
                        "gold": "#F4C430",
                        "terrain": "#F5F2E9",
                        "charcoal": "#18181B",
                        "clay": "#D95D39",
                    },
                    fontFamily: {
                        "heading": ["Rubik", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    boxShadow: {
                        "hard": "4px 4px 0px 0px rgba(0,0,0,0.1)",
                        "hard-lg": "6px 6px 0px 0px rgba(0,0,0,0.15)",
                        "3d": "0 6px 0 #236E2D",
                    },
                },
            },
        }
    </script>
    <style>
        .btn-3d {
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-3d:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #236E2D;
        }
        .map-sepia {
            filter: sepia(0.2) contrast(1.05) saturate(0.9);
        }

        .hud-pill {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Map Assembly - Hover Expansion */
        .map-assembly {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: bottom right;
        }

        @media (max-width: 639px) {
            .map-assembly {
                width: 100%;
            }
            .map-assembly .map-container {
                width: 100%;
                height: 180px;
            }
        }

        @media (min-width: 640px) {
            .map-assembly {
                width: 340px;
            }
            .map-assembly .map-container {
                width: 340px;
                height: 220px;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .map-assembly:hover {
                width: 480px;
            }
            .map-assembly:hover .map-container {
                width: 480px;
                height: 320px;
            }
            .map-assembly:hover .expand-hint {
                opacity: 0;
            }
        }

        @media (min-width: 1024px) {
            .map-assembly:hover {
                width: 560px;
            }
            .map-assembly:hover .map-container {
                width: 560px;
                height: 380px;
            }
        }

        /* Tooltip for icon buttons */
        .icon-btn-tooltip {
            position: relative;
        }
        .icon-btn-tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            left: calc(100% + 8px);
            top: 50%;
            transform: translateY(-50%);
            background: rgba(24, 24, 27, 0.9);
            color: white;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
        }
        .icon-btn-tooltip:hover::after {
            opacity: 1;
        }

        /* Disconnection Toast Slide-Down Animation */
        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .slide-down {
            animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
    </style>
</head>
<body class="font-body antialiased h-screen w-full overflow-hidden relative">
    <!-- Full-screen 360 Image Background -->
    <div class="absolute inset-0 z-0">
        <div
            class="absolute inset-0 bg-cover bg-center"
            style="background-image: url('https://images.unsplash.com/photo-1562774053-701939374585?q=80&w=2986&auto=format&fit=crop');"
        ></div>
        <div class="absolute inset-0 bg-black/5 pointer-events-none"></div>
    </div>

    <!-- Main UI Overlay -->
    <div class="relative z-10 h-full w-full flex flex-col justify-between p-4 sm:p-6">

        <!-- Top Row: HUD Pill (centered) -->
        <div class="flex items-start justify-center pt-2">
            <div class="hud-pill rounded-full px-2 py-2 shadow-hard flex items-center border border-white/50">
                <!-- Round -->
                <div class="flex items-center gap-1.5 sm:gap-2 px-3 sm:px-4">
                    <span class="text-[10px] sm:text-xs font-semibold uppercase tracking-wider text-charcoal/50">Round</span>
                    <span class="font-mono font-bold text-base sm:text-lg text-charcoal">3<span class="text-charcoal/40">/5</span></span>
                </div>

                <div class="w-px h-5 sm:h-6 bg-gray-200"></div>

                <!-- Score -->
                <div class="flex items-center gap-1.5 sm:gap-2 px-3 sm:px-4">
                    <span class="text-[10px] sm:text-xs font-semibold uppercase tracking-wider text-charcoal/50">Score</span>
                    <span class="font-mono font-bold text-base sm:text-lg text-charcoal">4,500</span>
                </div>

                <div class="w-px h-5 sm:h-6 bg-gray-200"></div>

                <!-- Timer -->
                <div class="flex items-center gap-1.5 sm:gap-2 px-3 sm:px-4">
                    <span class="material-symbols-outlined text-clay text-base sm:text-lg">timer</span>
                    <span class="font-mono font-bold text-base sm:text-lg text-clay">01:23</span>
                </div>

                <div class="w-px h-5 sm:h-6 bg-gray-200"></div>

                <!-- Opponent Status Indicators -->
                <div class="flex items-center gap-3 px-3 sm:px-4">
                    <!-- Player 2: SJ (blue) — disconnected -->
                    <div class="relative flex flex-col items-center">
                        <div class="w-6 h-6 rounded-full flex items-center justify-center text-white text-[9px] font-bold opacity-50" style="background-color: #3B82F6;">
                            SJ
                        </div>
                        <span class="material-symbols-outlined absolute -bottom-1.5 -right-1.5 text-amber-500" style="font-variation-settings: 'FILL' 1; font-size: 14px;">wifi_off</span>
                    </div>

                    <!-- Player 3: ML (purple) — still thinking -->
                    <div class="relative flex flex-col items-center">
                        <div class="w-6 h-6 rounded-full flex items-center justify-center text-white text-[9px] font-bold" style="background-color: #8B5CF6;">
                            ML
                        </div>
                        <span class="material-symbols-outlined absolute -bottom-1.5 -right-1.5 text-charcoal/40" style="font-variation-settings: 'FILL' 1; font-size: 14px;">schedule</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Disconnection Toast Notification -->
        <div class="absolute top-20 sm:top-[88px] left-1/2 -translate-x-1/2 z-20 slide-down">
            <div class="bg-charcoal/95 backdrop-blur-sm text-white rounded-xl px-4 py-3 shadow-hard-lg flex items-center gap-3 max-w-sm mx-auto border-l-4 border-amber-400">
                <!-- Warning Icon -->
                <div class="flex-shrink-0">
                    <span class="material-symbols-outlined text-xl text-amber-400">wifi_off</span>
                </div>

                <!-- Content -->
                <div class="flex-1 min-w-0">
                    <p class="font-semibold text-sm text-white">Sarah J. disconnected</p>
                    <p class="text-xs text-white/60 font-mono">28s to reconnect</p>
                </div>

                <!-- Close Button -->
                <button class="flex-shrink-0 w-6 h-6 flex items-center justify-center rounded-full text-white/40 hover:text-white hover:bg-white/10 transition-colors">
                    <span class="material-symbols-outlined text-base">close</span>
                </button>
            </div>
        </div>

        <!-- Left Side: Forfeit Button (Bottom-left, icon only with tooltip) -->
        <div class="hidden sm:flex absolute left-6 bottom-6 flex-col gap-3">
            <button
                class="icon-btn-tooltip w-11 h-11 bg-white/90 backdrop-blur-sm rounded-xl shadow-hard flex items-center justify-center text-clay hover:bg-clay/10 hover:text-clay transition-colors"
                data-tooltip="Forfeit Game"
            >
                <span class="material-symbols-outlined text-xl">flag</span>
            </button>
        </div>

        <!-- Right Side: Zoom Controls (Desktop only) -->
        <div class="hidden sm:flex absolute right-6 top-1/2 -translate-y-1/2 flex-col gap-3">
            <button class="w-11 h-11 bg-white/90 backdrop-blur-sm rounded-xl shadow-hard flex items-center justify-center text-charcoal hover:bg-white transition-colors">
                <span class="material-symbols-outlined text-xl">add</span>
            </button>
            <button class="w-11 h-11 bg-white/90 backdrop-blur-sm rounded-xl shadow-hard flex items-center justify-center text-charcoal hover:bg-white transition-colors">
                <span class="material-symbols-outlined text-xl">remove</span>
            </button>
            <button class="w-11 h-11 bg-white/90 backdrop-blur-sm rounded-xl shadow-hard flex items-center justify-center text-charcoal hover:bg-white transition-colors mt-2">
                <span class="material-symbols-outlined text-xl">near_me</span>
            </button>
        </div>

        <!-- Bottom: Map Assembly (Expands on Hover) -->
        <div class="flex justify-center sm:justify-end items-end pb-2">
            <!-- Mobile Forfeit Button (visible only on mobile, positioned left of map) -->
            <button
                class="sm:hidden w-11 h-11 bg-white/90 backdrop-blur-sm rounded-xl shadow-hard flex items-center justify-center text-clay hover:bg-clay/10 transition-colors mr-3 flex-shrink-0"
            >
                <span class="material-symbols-outlined text-xl">flag</span>
            </button>

            <div class="map-assembly flex flex-col gap-3">
                <!-- Map Container -->
                <div class="map-container relative rounded-2xl overflow-hidden border-4 border-white shadow-hard-lg">
                    <!-- Sepia-toned Map -->
                    <div class="absolute inset-0 bg-terrain map-sepia">
                        <div class="absolute inset-0" style="background-image: repeating-linear-gradient(45deg, #ddd 0, #ddd 1px, transparent 0, transparent 50%); background-size: 20px 20px; opacity: 0.3;"></div>
                    </div>

                    <!-- Green Pin -->
                    <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-full cursor-pointer hover:-translate-y-[calc(100%+4px)] transition-transform">
                        <span class="material-symbols-outlined text-jungle text-4xl sm:text-5xl drop-shadow-lg" style="font-variation-settings: 'FILL' 1;">location_on</span>
                    </div>

                    <!-- Expand Hint (Desktop only) -->
                    <div class="expand-hint hidden sm:flex absolute top-3 right-3 items-center gap-1.5 bg-white/90 rounded-lg px-2 py-1 shadow-sm transition-opacity">
                        <span class="material-symbols-outlined text-sm text-charcoal/50">open_in_full</span>
                        <span class="text-[10px] font-medium text-charcoal/50 uppercase">Hover to expand</span>
                    </div>

                    <!-- Instruction -->
                    <div class="absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur-sm py-2 text-center border-t border-gray-100">
                        <span class="text-[10px] sm:text-xs font-semibold text-charcoal/50 uppercase tracking-wider">Click to place your guess</span>
                    </div>
                </div>

                <!-- GUESS Button -->
                <button class="btn-3d w-full bg-jungle hover:bg-jungle-dark text-white font-heading font-bold text-lg sm:text-xl py-3 sm:py-4 rounded-xl shadow-3d flex items-center justify-center gap-2 transition-colors">
                    <span>GUESS</span>
                    <span class="material-symbols-outlined text-xl sm:text-2xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
