<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>VandyGuessr - Round Results</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rubik:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "jungle": "#2E933C",
                        "jungle-dark": "#236E2D",
                        "gold": "#F4C430",
                        "terrain": "#F5F2E9",
                        "charcoal": "#18181B",
                        "clay": "#D95D39",
                    },
                    fontFamily: {
                        "heading": ["Rubik", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    boxShadow: {
                        "hard": "4px 4px 0px 0px rgba(0,0,0,0.1)",
                        "hard-lg": "6px 6px 0px 0px rgba(0,0,0,0.15)",
                        "3d": "0 6px 0 #236E2D",
                    },
                    borderRadius: {
                        "card": "16px",
                        "btn": "12px",
                    }
                },
            },
        }
    </script>
    <style>
        .btn-3d {
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-3d:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #236E2D;
        }
        .map-sepia {
            filter: sepia(0.2) contrast(1.05) saturate(0.9);
        }
        .dashed-line {
            stroke-dasharray: 8, 6;
            animation: dash 1s linear infinite;
        }
        @keyframes dash {
            to {
                stroke-dashoffset: -14;
            }
        }
    </style>
</head>
<body class="font-body antialiased min-h-screen bg-terrain">
    <!-- Map Background (Top 70%) -->
    <div class="h-[70vh] relative">
        <!-- Sepia-toned Map -->
        <div
            class="absolute inset-0 bg-cover bg-center map-sepia"
            style="background-image: url('https://api.mapbox.com/styles/v1/mapbox/light-v11/static/-86.8025,36.1447,16,0/1200x800?access_token=pk.placeholder'); background-color: #e8e0d5;"
        >
            <!-- Fallback -->
            <div class="absolute inset-0 bg-terrain"></div>
            <div class="absolute inset-0" style="background-image: repeating-linear-gradient(45deg, #ddd 0, #ddd 1px, transparent 0, transparent 50%); background-size: 30px 30px; opacity: 0.2;"></div>
        </div>

        <!-- SVG Overlay for Line and Markers -->
        <svg class="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none">
            <!-- Dashed Line connecting guess to actual -->
            <line
                x1="35" y1="55"
                x2="65" y2="40"
                stroke="#18181B"
                stroke-width="0.4"
                class="dashed-line"
            />
        </svg>

        <!-- User Guess Pin (Green) -->
        <div class="absolute" style="left: 35%; top: 55%; transform: translate(-50%, -100%);">
            <div class="relative">
                <span class="material-symbols-outlined text-jungle text-5xl drop-shadow-lg" style="font-variation-settings: 'FILL' 1;">location_on</span>
                <div class="absolute -bottom-6 left-1/2 -translate-x-1/2 bg-white rounded-full px-2 py-0.5 shadow-sm text-xs font-semibold text-charcoal whitespace-nowrap">
                    Your Guess
                </div>
            </div>
        </div>

        <!-- Actual Location Pin (Gold) -->
        <div class="absolute" style="left: 65%; top: 40%; transform: translate(-50%, -100%);">
            <div class="relative">
                <span class="material-symbols-outlined text-gold text-5xl drop-shadow-lg" style="font-variation-settings: 'FILL' 1;">flag</span>
                <div class="absolute -bottom-6 left-1/2 -translate-x-1/2 bg-gold rounded-full px-2 py-0.5 shadow-sm text-xs font-bold text-charcoal whitespace-nowrap">
                    Actual
                </div>
            </div>
        </div>

        <!-- Distance Label (middle of line) -->
        <div class="absolute bg-white rounded-full px-4 py-2 shadow-hard font-mono font-bold text-charcoal" style="left: 50%; top: 47%; transform: translate(-50%, -50%);">
            125m
        </div>

        <!-- Top Status Pill -->
        <div class="absolute top-6 left-1/2 -translate-x-1/2">
            <div class="bg-white/95 backdrop-blur-sm rounded-full px-6 py-2 shadow-hard flex items-center gap-4 border border-white/50">
                <span class="font-heading font-bold text-charcoal">Round 3/5</span>
                <div class="w-px h-4 bg-gray-200"></div>
                <span class="font-mono font-bold text-charcoal">4,500 pts</span>
            </div>
        </div>
    </div>

    <!-- Bottom Sheet (Results Card) -->
    <div class="bg-white rounded-t-[24px] -mt-6 relative z-10 shadow-hard-lg border-t border-gray-100">
        <div class="max-w-2xl mx-auto px-6 py-8">
            <!-- Score Display -->
            <div class="flex items-center justify-between mb-6">
                <div>
                    <div class="text-sm font-semibold text-charcoal/50 uppercase tracking-wider mb-1">Round Score</div>
                    <div class="font-heading font-bold text-5xl text-jungle">4,850</div>
                    <div class="text-charcoal/60 text-sm mt-1">Distance: 125 meters</div>
                </div>
                <!-- Medal Icon -->
                <div class="w-20 h-20 bg-gold/20 rounded-full flex items-center justify-center">
                    <span class="material-symbols-outlined text-gold text-5xl" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
                </div>
            </div>

            <!-- Progress Dots -->
            <div class="flex items-center justify-center gap-3 mb-8">
                <div class="w-3 h-3 rounded-full bg-jungle"></div>
                <div class="w-3 h-3 rounded-full bg-jungle"></div>
                <div class="w-3 h-3 rounded-full bg-jungle"></div>
                <div class="w-3 h-3 rounded-full bg-gray-200"></div>
                <div class="w-3 h-3 rounded-full bg-gray-200"></div>
            </div>

            <!-- Action Button -->
            <button class="btn-3d w-full bg-jungle hover:bg-jungle-dark text-white font-heading font-bold text-xl py-4 rounded-btn shadow-3d flex items-center justify-center gap-3 transition-colors">
                <span>Next Round</span>
                <span class="material-symbols-outlined text-2xl">arrow_forward</span>
            </button>
        </div>
    </div>
</body>
</html>
