<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>VandyGuessr - Gameplay</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rubik:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "jungle": "#2E933C",
                        "jungle-dark": "#236E2D",
                        "gold": "#F4C430",
                        "terrain": "#F5F2E9",
                        "charcoal": "#18181B",
                        "clay": "#D95D39",
                    },
                    fontFamily: {
                        "heading": ["Rubik", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    boxShadow: {
                        "hard": "4px 4px 0px 0px rgba(0,0,0,0.1)",
                        "hard-lg": "6px 6px 0px 0px rgba(0,0,0,0.15)",
                        "3d": "0 6px 0 #236E2D",
                    },
                    borderRadius: {
                        "card": "16px",
                        "btn": "12px",
                    }
                },
            },
        }
    </script>
    <style>
        .btn-3d {
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-3d:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #236E2D;
        }
        .map-sepia {
            filter: sepia(0.25) contrast(1.05) saturate(0.9);
        }
        .map-container {
            transition: transform 0.2s;
        }
        .map-container:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body class="font-body antialiased h-screen w-full overflow-hidden relative">
    <!-- Full-screen 360 Image Background -->
    <div class="absolute inset-0 z-0">
        <div
            class="absolute inset-0 bg-cover bg-center"
            style="background-image: url('https://images.unsplash.com/photo-1562774053-701939374585?q=80&w=2986&auto=format&fit=crop');"
        ></div>
        <!-- Subtle overlay for UI visibility -->
        <div class="absolute inset-0 bg-black/5 pointer-events-none"></div>
    </div>

    <!-- Main UI Overlay -->
    <div class="relative z-10 h-full w-full flex flex-col justify-between p-6">

        <!-- Top: Status Pill -->
        <div class="flex justify-center pt-2">
            <div class="bg-white/95 backdrop-blur-sm rounded-full px-8 py-3 shadow-hard flex items-center gap-6 border border-white/50">
                <!-- Round -->
                <div class="text-center pr-6 border-r border-gray-200">
                    <div class="text-xs font-semibold uppercase tracking-wider text-charcoal/50">Round</div>
                    <div class="font-mono font-bold text-xl text-charcoal">3/5</div>
                </div>
                <!-- Score -->
                <div class="text-center pr-6 border-r border-gray-200">
                    <div class="text-xs font-semibold uppercase tracking-wider text-charcoal/50">Score</div>
                    <div class="font-mono font-bold text-xl text-charcoal">4,500</div>
                </div>
                <!-- Timer -->
                <div class="text-center">
                    <div class="text-xs font-semibold uppercase tracking-wider text-charcoal/50">Time</div>
                    <div class="font-mono font-bold text-xl text-clay">01:23</div>
                </div>
            </div>
        </div>

        <!-- Middle: Side Controls -->
        <div class="absolute right-6 top-1/2 -translate-y-1/2 flex flex-col gap-3">
            <button class="w-12 h-12 bg-white/90 backdrop-blur-sm rounded-full shadow-md flex items-center justify-center text-charcoal hover:bg-white transition-colors">
                <span class="material-symbols-outlined text-2xl">add</span>
            </button>
            <button class="w-12 h-12 bg-white/90 backdrop-blur-sm rounded-full shadow-md flex items-center justify-center text-charcoal hover:bg-white transition-colors">
                <span class="material-symbols-outlined text-2xl">remove</span>
            </button>
            <button class="w-12 h-12 bg-white/90 backdrop-blur-sm rounded-full shadow-md flex items-center justify-center text-charcoal hover:bg-white transition-colors mt-4">
                <span class="material-symbols-outlined text-2xl">near_me</span>
            </button>
        </div>

        <!-- Bottom: Map Assembly -->
        <div class="flex justify-end items-end pb-2">
            <div class="flex flex-col gap-4">
                <!-- Map Container -->
                <div class="map-container relative w-[360px] h-[260px] rounded-card overflow-hidden border-4 border-white shadow-hard-lg">
                    <!-- Sepia-toned Map -->
                    <div
                        class="absolute inset-0 bg-cover bg-center map-sepia"
                        style="background-image: url('https://api.mapbox.com/styles/v1/mapbox/light-v11/static/-86.8025,36.1447,15,0/400x300?access_token=pk.placeholder'); background-color: #e8e0d5;"
                    >
                        <!-- Fallback pattern if map doesn't load -->
                        <div class="absolute inset-0 bg-terrain opacity-90"></div>
                        <div class="absolute inset-0" style="background-image: repeating-linear-gradient(45deg, #ddd 0, #ddd 1px, transparent 0, transparent 50%); background-size: 20px 20px; opacity: 0.3;"></div>
                    </div>

                    <!-- Green Pin (centered as placeholder) -->
                    <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-full cursor-pointer hover:-translate-y-[calc(100%+4px)] transition-transform">
                        <span class="material-symbols-outlined text-jungle text-5xl drop-shadow-lg" style="font-variation-settings: 'FILL' 1;">location_on</span>
                    </div>

                    <!-- Map Controls (top right corner) -->
                    <div class="absolute top-3 right-3 flex flex-col gap-2">
                        <button class="w-8 h-8 bg-white rounded-lg shadow-sm flex items-center justify-center text-charcoal/70 hover:text-charcoal transition-colors">
                            <span class="material-symbols-outlined text-lg">open_in_full</span>
                        </button>
                    </div>

                    <!-- Instruction Label -->
                    <div class="absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur-sm py-2 text-center border-t border-gray-100">
                        <span class="text-xs font-semibold text-charcoal/60 uppercase tracking-wider">Click to place your guess</span>
                    </div>
                </div>

                <!-- GUESS Button -->
                <button class="btn-3d w-full bg-jungle hover:bg-jungle-dark text-white font-heading font-bold text-xl py-4 rounded-btn shadow-3d flex items-center justify-center gap-2 transition-colors">
                    <span>GUESS</span>
                    <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                </button>
            </div>
        </div>

        <!-- Bottom Left: Location Context (optional) -->
        <div class="absolute bottom-6 left-6">
            <div class="bg-black/50 backdrop-blur-md rounded-lg px-4 py-3 text-white max-w-xs">
                <div class="flex items-center gap-2 text-white/70 text-xs font-semibold uppercase tracking-wide mb-1">
                    <span class="material-symbols-outlined text-sm">visibility</span>
                    Viewing
                </div>
                <h2 class="font-heading font-bold text-lg">Campus Location</h2>
            </div>
        </div>
    </div>
</body>
</html>
