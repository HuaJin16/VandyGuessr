<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>VandyGuessr - Leaderboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rubik:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "jungle": "#2E933C",
                        "jungle-dark": "#236E2D",
                        "gold": "#F4C430",
                        "gold-pale": "rgba(244, 196, 48, 0.15)",
                        "silver": "#C0C0C0",
                        "bronze": "#CD7F32",
                        "terrain": "#F5F2E9",
                        "charcoal": "#18181B",
                        "clay": "#D95D39",
                    },
                    fontFamily: {
                        "heading": ["Rubik", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    boxShadow: {
                        "hard": "4px 4px 0px 0px rgba(0,0,0,0.1)",
                        "hard-lg": "6px 6px 0px 0px rgba(0,0,0,0.12)",
                    },
                    borderRadius: {
                        "card": "16px",
                        "btn": "12px",
                    }
                },
            },
        }
    </script>
</head>
<body class="font-body antialiased min-h-screen bg-terrain">
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white border-b-2 border-gray-100 shadow-sm">
        <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
            <!-- Back Button -->
            <a href="#" class="flex items-center gap-2 text-charcoal/60 hover:text-charcoal transition-colors">
                <span class="material-symbols-outlined text-xl">arrow_back</span>
                <span class="font-medium">Back</span>
            </a>

            <!-- Title -->
            <h1 class="font-heading font-bold text-xl text-charcoal">Leaderboard</h1>

            <!-- Placeholder for symmetry -->
            <div class="w-16"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-6 py-8">
        <!-- Filters -->
        <div class="flex flex-wrap items-center gap-4 mb-8">
            <!-- Timeframe Toggle -->
            <div class="flex items-center bg-white rounded-full p-1 shadow-hard border border-gray-100">
                <button class="px-5 py-2 rounded-full bg-jungle text-white font-semibold text-sm transition-colors">
                    Daily
                </button>
                <button class="px-5 py-2 rounded-full text-charcoal/60 font-medium text-sm hover:text-charcoal transition-colors">
                    Weekly
                </button>
                <button class="px-5 py-2 rounded-full text-charcoal/60 font-medium text-sm hover:text-charcoal transition-colors">
                    All Time
                </button>
            </div>

            <!-- Mode Toggle -->
            <div class="flex items-center bg-white rounded-full p-1 shadow-hard border border-gray-100">
                <button class="px-5 py-2 rounded-full bg-charcoal text-white font-semibold text-sm transition-colors">
                    All Modes
                </button>
                <button class="px-5 py-2 rounded-full text-charcoal/60 font-medium text-sm hover:text-charcoal transition-colors">
                    Indoor
                </button>
                <button class="px-5 py-2 rounded-full text-charcoal/60 font-medium text-sm hover:text-charcoal transition-colors">
                    Outdoor
                </button>
            </div>
        </div>

        <!-- Leaderboard Card -->
        <div class="bg-white rounded-card border border-gray-100 shadow-hard overflow-hidden">
            <!-- Table Header -->
            <div class="grid grid-cols-12 gap-4 px-6 py-4 bg-terrain/50 border-b border-gray-100">
                <div class="col-span-1 text-xs font-bold text-charcoal/50 uppercase tracking-wider">#</div>
                <div class="col-span-5 text-xs font-bold text-charcoal/50 uppercase tracking-wider">Player</div>
                <div class="col-span-3 text-xs font-bold text-charcoal/50 uppercase tracking-wider text-right">Score</div>
                <div class="col-span-3 text-xs font-bold text-charcoal/50 uppercase tracking-wider text-right">Games</div>
            </div>

            <!-- Leaderboard Rows -->
            <div class="divide-y divide-gray-50">
                <!-- Rank 1 (Gold) -->
                <div class="grid grid-cols-12 gap-4 px-6 py-4 items-center hover:bg-terrain/30 transition-colors">
                    <div class="col-span-1 flex items-center gap-2">
                        <span class="material-symbols-outlined text-gold text-xl" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
                    </div>
                    <div class="col-span-5 flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-gray-200 overflow-hidden">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=alice" alt="Avatar" class="w-full h-full object-cover"/>
                        </div>
                        <span class="font-semibold text-charcoal">Alice V.</span>
                    </div>
                    <div class="col-span-3 text-right font-mono font-bold text-charcoal">24,950</div>
                    <div class="col-span-3 text-right font-mono text-charcoal/60">142</div>
                </div>

                <!-- Rank 2 (Silver) -->
                <div class="grid grid-cols-12 gap-4 px-6 py-4 items-center hover:bg-terrain/30 transition-colors">
                    <div class="col-span-1 flex items-center gap-2">
                        <span class="material-symbols-outlined text-silver text-xl" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
                    </div>
                    <div class="col-span-5 flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-gray-200 overflow-hidden">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=bob" alt="Avatar" class="w-full h-full object-cover"/>
                        </div>
                        <span class="font-semibold text-charcoal">Bob D.</span>
                    </div>
                    <div class="col-span-3 text-right font-mono font-bold text-charcoal">23,100</div>
                    <div class="col-span-3 text-right font-mono text-charcoal/60">88</div>
                </div>

                <!-- Rank 3 (Bronze) -->
                <div class="grid grid-cols-12 gap-4 px-6 py-4 items-center hover:bg-terrain/30 transition-colors">
                    <div class="col-span-1 flex items-center gap-2">
                        <span class="material-symbols-outlined text-bronze text-xl" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
                    </div>
                    <div class="col-span-5 flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-gray-200 overflow-hidden">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=charlie" alt="Avatar" class="w-full h-full object-cover"/>
                        </div>
                        <span class="font-semibold text-charcoal">Charlie K.</span>
                    </div>
                    <div class="col-span-3 text-right font-mono font-bold text-charcoal">21,000</div>
                    <div class="col-span-3 text-right font-mono text-charcoal/60">65</div>
                </div>

                <!-- Rank 4 -->
                <div class="grid grid-cols-12 gap-4 px-6 py-4 items-center hover:bg-terrain/30 transition-colors">
                    <div class="col-span-1 font-mono font-bold text-charcoal/60">4</div>
                    <div class="col-span-5 flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-gray-200 overflow-hidden">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=diana" alt="Avatar" class="w-full h-full object-cover"/>
                        </div>
                        <span class="font-semibold text-charcoal">Diana L.</span>
                    </div>
                    <div class="col-span-3 text-right font-mono font-bold text-charcoal">19,800</div>
                    <div class="col-span-3 text-right font-mono text-charcoal/60">52</div>
                </div>

                <!-- Rank 5 -->
                <div class="grid grid-cols-12 gap-4 px-6 py-4 items-center hover:bg-terrain/30 transition-colors">
                    <div class="col-span-1 font-mono font-bold text-charcoal/60">5</div>
                    <div class="col-span-5 flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-gray-200 overflow-hidden">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=evan" alt="Avatar" class="w-full h-full object-cover"/>
                        </div>
                        <span class="font-semibold text-charcoal">Evan M.</span>
                    </div>
                    <div class="col-span-3 text-right font-mono font-bold text-charcoal">18,500</div>
                    <div class="col-span-3 text-right font-mono text-charcoal/60">47</div>
                </div>

                <!-- ... more rows ... -->
                <div class="px-6 py-3 text-center text-charcoal/40 text-sm">
                    ...
                </div>

                <!-- Rank 42 (Current User - Highlighted) -->
                <div class="grid grid-cols-12 gap-4 px-6 py-4 items-center bg-gold-pale border-l-4 border-gold">
                    <div class="col-span-1 font-mono font-bold text-charcoal">42</div>
                    <div class="col-span-5 flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-gray-200 overflow-hidden ring-2 ring-gold ring-offset-2">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=player1" alt="Avatar" class="w-full h-full object-cover"/>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-charcoal">You</span>
                            <span class="bg-jungle text-white text-xs font-bold px-2 py-0.5 rounded">YOU</span>
                        </div>
                    </div>
                    <div class="col-span-3 text-right font-mono font-bold text-charcoal">15,200</div>
                    <div class="col-span-3 text-right font-mono text-charcoal/60">28</div>
                </div>
            </div>

            <!-- Pagination -->
            <div class="flex items-center justify-center gap-2 px-6 py-4 bg-terrain/30 border-t border-gray-100">
                <button class="w-10 h-10 rounded-lg bg-white border border-gray-200 flex items-center justify-center text-charcoal/60 hover:text-charcoal hover:border-gray-300 transition-colors">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <button class="w-10 h-10 rounded-lg bg-jungle text-white font-semibold">1</button>
                <button class="w-10 h-10 rounded-lg bg-white border border-gray-200 text-charcoal/60 font-semibold hover:border-gray-300 transition-colors">2</button>
                <button class="w-10 h-10 rounded-lg bg-white border border-gray-200 text-charcoal/60 font-semibold hover:border-gray-300 transition-colors">3</button>
                <span class="text-charcoal/40 px-2">...</span>
                <button class="w-10 h-10 rounded-lg bg-white border border-gray-200 text-charcoal/60 font-semibold hover:border-gray-300 transition-colors">12</button>
                <button class="w-10 h-10 rounded-lg bg-white border border-gray-200 flex items-center justify-center text-charcoal/60 hover:text-charcoal hover:border-gray-300 transition-colors">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>
        </div>
    </main>
</body>
</html>
