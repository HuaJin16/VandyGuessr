<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VandyGuessr Round 10 - Lobby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand: #2e933c;
      --brand-dark: #236e2d;
      --brand-light: rgba(46, 147, 60, 0.1);
      --gold: #e8a817;
      --gold-dark: #c48d10;
      --gold-light: rgba(232, 168, 23, 0.12);
      --gold-ink: #6b4c00;
      --danger: #dc4a3a;
      --danger-light: rgba(220, 74, 58, 0.1);
      --ink: #1a1a1a;
      --muted: #5c6370;
      --line: #e5e2db;
      --line-strong: #c4c0b8;
      --surface: #ffffff;
      --canvas: #f7f5f0;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-pill: 9999px;
      --shadow-sm: 3px 3px 0 0 rgba(0, 0, 0, 0.06);
      --shadow-md: 4px 4px 0 0 rgba(0, 0, 0, 0.08);
      --ring: 0 0 0 3px rgba(46, 147, 60, 0.35);
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --mp: #3b82f6;

      --p-you: #2e933c;
      --p-blue: #3b82f6;
      --p-purple: #8b5cf6;
      --p-orange: #f97316;
      --p-cyan: #06b6d4;
      --p-pink: #ec4899;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, sans-serif;
      color: var(--ink);
      background: var(--canvas);
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      width: min(600px, calc(100% - 32px));
      margin: 0 auto;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--ink);
    }

    .mark {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-md);
      background: var(--brand);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 800;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      font-weight: 800;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .main {
      width: min(600px, calc(100% - 32px));
      margin: 16px auto 24px;
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 16px;
    }

    .overline {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .mp-overline { color: var(--muted); }

    /* Invite Code */
    .invite-section { text-align: center; }

    .invite-label {
      margin: 0 0 12px;
      font-size: 14px;
      color: var(--muted);
    }

    .code-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 14px;
    }

    .code-char {
      width: 44px;
      height: 52px;
      border: 2px solid var(--mp);
      border-radius: var(--radius-sm);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      display: grid;
      place-items: center;
      font-family: "IBM Plex Mono", monospace;
      font-size: 24px;
      font-weight: 600;
      color: var(--ink);
      transition: transform 100ms var(--ease);
    }

    .code-char:hover { transform: translateY(-2px); }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface);
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 120ms var(--ease);
    }

    .copy-btn:hover {
      border-color: var(--brand);
      color: var(--brand);
      background: var(--brand-light);
    }

    .copy-btn:focus-visible { outline: none; box-shadow: var(--ring); }

    .copy-icon {
      width: 14px;
      height: 14px;
    }

    /* Player List */
    .players-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .players-title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
    }

    .players-count {
      font-family: "IBM Plex Mono", monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }

    .player-list {
      display: grid;
      gap: 6px;
    }

    .player-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface);
    }

    .player-row.is-you {
      background: var(--brand-light);
      border-color: var(--brand);
    }

    .player-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      position: relative;
    }

    .player-online {
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--brand);
      border: 2px solid var(--surface);
    }

    .player-row.is-you .player-online {
      border-color: #e8f5e9;
    }

    .player-name {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: var(--radius-pill);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .badge-host {
      background: var(--gold-light);
      color: var(--gold-ink);
    }

    .badge-you {
      background: var(--brand-light);
      color: var(--brand-dark);
    }

    .player-row-empty {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 2px dashed var(--line);
      border-radius: var(--radius-md);
      opacity: 0.45;
    }

    .empty-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--line);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .empty-text {
      margin: 0;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
    }

    @keyframes dots {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75% { content: "..."; }
    }

    .dots::after {
      content: "";
      animation: dots 1.5s steps(4, end) infinite;
    }

    /* Settings Pills */
    .settings-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      background: #f0ede6;
      color: var(--muted);
    }

    .pill-icon {
      width: 14px;
      height: 14px;
    }

    /* Buttons */
    .button-primary {
      width: 100%;
      border: none;
      border-radius: var(--radius-md);
      background: var(--brand);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 14px;
      box-shadow: 0 4px 0 var(--brand-dark);
      cursor: pointer;
      transition: all 120ms var(--ease);
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .button-primary:hover { background: #278234; }
    .button-primary:active { transform: translateY(4px); box-shadow: 0 0 0 var(--brand-dark); }
    .button-primary:focus-visible { outline: none; box-shadow: 0 4px 0 var(--brand-dark), var(--ring); }

    .button-ghost {
      width: 100%;
      border: none;
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      padding: 10px 14px;
      cursor: pointer;
      transition: all 120ms var(--ease);
    }

    .button-ghost:hover { color: var(--danger); background: var(--danger-light); }
    .button-ghost:focus-visible { outline: none; box-shadow: var(--ring); }

    .actions {
      display: grid;
      gap: 6px;
    }

    @media (min-width: 700px) {
      .header-inner { min-height: 64px; }
      .card { padding: 18px; }
      .code-char { width: 48px; height: 56px; font-size: 26px; }
    }

    @media (max-width: 400px) {
      .code-char { width: 38px; height: 46px; font-size: 20px; gap: 4px; }
      .code-row { gap: 4px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a class="brand" href="02-home.html">
        <div class="mark">VG</div>
        <h1>VandyGuessr</h1>
      </a>
      <div class="status">
        <div class="status-dot"></div>
        <span>Connected</span>
      </div>
    </div>
  </header>

  <main class="main">
    <!-- Invite Code -->
    <section class="card invite-section">
      <p class="overline mp-overline">Invite Code</p>
      <div class="code-row" style="margin-top: 12px;">
        <span class="code-char">A</span>
        <span class="code-char">3</span>
        <span class="code-char">X</span>
        <span class="code-char">9</span>
        <span class="code-char">B</span>
        <span class="code-char">K</span>
      </div>
      <button class="copy-btn" type="button">
        <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Code
      </button>
    </section>

    <!-- Players -->
    <section class="card">
      <div class="players-header">
        <p class="players-title">Players</p>
        <span class="players-count">4<span style="opacity:0.5">/6</span></span>
      </div>
      <div class="player-list">
        <!-- Player 1: You (Host) -->
        <div class="player-row is-you">
          <div class="player-avatar" style="background: var(--p-you);">
            RM
            <div class="player-online"></div>
          </div>
          <p class="player-name">Ryan McCauley</p>
          <span class="badge badge-host">Host</span>
          <span class="badge badge-you">You</span>
        </div>
        <!-- Player 2 -->
        <div class="player-row">
          <div class="player-avatar" style="background: var(--p-blue);">
            SW
            <div class="player-online"></div>
          </div>
          <p class="player-name">Sarah Williams</p>
        </div>
        <!-- Player 3 -->
        <div class="player-row">
          <div class="player-avatar" style="background: var(--p-purple);">
            AC
            <div class="player-online"></div>
          </div>
          <p class="player-name">Alex Chen</p>
        </div>
        <!-- Player 4 -->
        <div class="player-row">
          <div class="player-avatar" style="background: var(--p-orange);">
            JT
            <div class="player-online"></div>
          </div>
          <p class="player-name">Jordan Taylor</p>
        </div>
        <!-- Empty Slot 5 -->
        <div class="player-row-empty">
          <div class="empty-avatar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#b5b0a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          </div>
          <p class="empty-text">Waiting for player<span class="dots"></span></p>
        </div>
        <!-- Empty Slot 6 -->
        <div class="player-row-empty">
          <div class="empty-avatar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#b5b0a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          </div>
          <p class="empty-text">Waiting for player<span class="dots"></span></p>
        </div>
      </div>
    </section>

    <!-- Settings -->
    <section class="card">
      <p class="overline" style="margin-bottom: 10px;">Game Settings</p>
      <div class="settings-row">
        <span class="pill">
          <svg class="pill-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          120s per round
        </span>
        <span class="pill">
          <svg class="pill-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          5 rounds
        </span>
      </div>
    </section>

    <!-- Actions -->
    <div class="actions">
      <a class="button-primary" href="09-countdown.html">Start Game</a>
      <button class="button-ghost" type="button">Leave Lobby</button>
    </div>
  </main>
</body>
</html>
