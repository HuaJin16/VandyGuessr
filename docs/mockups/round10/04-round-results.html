<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VandyGuessr Round 10 - Round Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand: #2e933c;
      --brand-dark: #236e2d;
      --gold: #e8a817;
      --gold-dark: #c48d10;
      --ink: #1a1a1a;
      --muted: #5c6370;
      --line: #e5e2db;
      --surface: #ffffff;
      --canvas: #f7f5f0;
      --danger: #dc4a3a;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-sm: 3px 3px 0 0 rgba(0, 0, 0, 0.06);
      --ring: 0 0 0 3px rgba(46, 147, 60, 0.35);
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, sans-serif;
      color: var(--ink);
      background: var(--canvas);
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .header-inner,
    .main {
      width: min(700px, calc(100% - 32px));
      margin: 0 auto;
    }

    .header-inner {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand { display: flex; align-items: center; gap: 10px; }
    .mark {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-md);
      background: var(--brand);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 13px;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.1;
    }

    .action {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      background: var(--surface);
      text-decoration: none;
    }

    .main {
      display: grid;
      gap: 14px;
      margin: 16px auto 24px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      padding: 16px;
    }

    .map-card {
      overflow: hidden;
    }

    .map {
      height: 300px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background-color: #ece7d8;
      background-image:
        repeating-linear-gradient(0deg, rgba(92, 99, 112, 0.17) 0 1px, transparent 1px 24px),
        repeating-linear-gradient(90deg, rgba(92, 99, 112, 0.17) 0 1px, transparent 1px 24px);
      position: relative;
    }

    .pin,
    .flag {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.25);
    }

    .pin {
      left: 32%;
      top: 63%;
      background: var(--brand);
    }

    .flag {
      left: 66%;
      top: 35%;
      background: var(--gold);
    }

    .line {
      position: absolute;
      left: 35%;
      top: 61%;
      width: 35%;
      border-top: 2px dashed rgba(92, 99, 112, 0.55);
      transform: rotate(-23deg);
      transform-origin: left center;
    }

    .distance {
      position: absolute;
      left: 50%;
      top: 51%;
      transform: translate(-50%, -50%);
      border: 1px solid var(--line);
      border-radius: var(--radius-pill);
      background: rgba(255, 255, 255, 0.96);
      padding: 4px 9px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink);
      box-shadow: var(--shadow-sm);
    }

    .legend {
      margin-top: 10px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--muted);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .dot.guess { background: var(--brand); }
    .dot.actual { background: var(--gold); }

    .overline {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .location {
      margin: 6px 0 0;
      font-size: 24px;
      line-height: 1.15;
    }

    .score {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .score-value {
      font-family: "IBM Plex Mono", monospace;
      font-size: 42px;
      line-height: 1;
      font-weight: 700;
      color: var(--brand);
    }

    .score-unit {
      font-family: "IBM Plex Mono", monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }

    .score-area {
      display: flex;
      align-items: flex-end;
      gap: 20px;
      margin-top: 14px;
    }

    .score-left { flex-shrink: 0; }

    .histogram-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .histogram-label {
      margin: 0 0 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .histogram {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 48px;
    }

    .hbar {
      flex: 1;
      border-radius: 2px 2px 0 0;
      background: var(--line);
      min-width: 0;
      transition: background 120ms var(--ease);
    }

    .hbar.you {
      background: var(--brand);
    }

    .histogram-range {
      display: flex;
      justify-content: space-between;
      margin-top: 3px;
      font-size: 10px;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
      font-weight: 500;
    }

    .stats {
      margin-top: 14px;
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: #faf9f6;
      padding: 10px;
      text-align: center;
    }

    .stat-label {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .stat-value {
      margin: 6px 0 0;
      font-family: "IBM Plex Mono", monospace;
      font-size: 16px;
      font-weight: 600;
      color: var(--ink);
    }

    .button {
      width: 100%;
      margin-top: 14px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--brand);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 14px;
      box-shadow: 0 4px 0 var(--brand-dark);
      cursor: pointer;
      transition: all 120ms var(--ease);
    }

    .button:hover { background: #278234; }
    .button:active { transform: translateY(4px); box-shadow: 0 0 0 var(--brand-dark); }
    .button:focus-visible { outline: none; box-shadow: 0 4px 0 var(--brand-dark), var(--ring); }

    @media (min-width: 700px) {
      .card { padding: 18px; }
      .map { height: 400px; }
    }

    @media (max-width: 500px) {
      .score-area {
        flex-direction: column;
        gap: 12px;
      }

      .score-value {
        font-size: 32px;
      }

      .location {
        font-size: 20px;
      }

      .stats {
        gap: 6px;
      }

      .stat {
        padding: 8px 6px;
      }

      .stat-value {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="mark">VG</div>
        <h1>Round Results</h1>
      </div>
      <a class="action" href="03-gameplay.html">← Back to Game</a>
    </div>
  </header>

  <main class="main">
    <section class="card map-card">
      <p class="overline">Map Debrief</p>
      <div class="map" role="img" aria-label="Map showing guess and actual location markers connected by dashed line">
        <div class="pin" aria-hidden="true"></div>
        <div class="flag" aria-hidden="true"></div>
        <div class="line" aria-hidden="true"></div>
        <div class="distance">125m</div>
      </div>
      <div class="legend">
        <span><span class="dot guess"></span>Your Guess</span>
        <span><span class="dot actual"></span>Actual Location</span>
      </div>
    </section>

    <section class="card summary-card">
      <p class="overline">Round 3 of 5</p>
      <h2 class="location">Kirkland Hall</h2>

      <div class="score-area">
        <div class="score-left">
          <div class="score">
            <span class="score-value">4,850</span>
            <span class="score-unit">points</span>
          </div>
        </div>
        <div class="histogram-wrap">
          <p class="histogram-label">Score Distribution</p>
          <div class="histogram" aria-label="Score distribution histogram. Your score is in the top 9%.">
            <div class="hbar" style="height:12%"></div>
            <div class="hbar" style="height:8%"></div>
            <div class="hbar" style="height:15%"></div>
            <div class="hbar" style="height:22%"></div>
            <div class="hbar" style="height:28%"></div>
            <div class="hbar" style="height:36%"></div>
            <div class="hbar" style="height:45%"></div>
            <div class="hbar" style="height:58%"></div>
            <div class="hbar" style="height:70%"></div>
            <div class="hbar" style="height:82%"></div>
            <div class="hbar" style="height:95%"></div>
            <div class="hbar" style="height:100%"></div>
            <div class="hbar" style="height:92%"></div>
            <div class="hbar" style="height:78%"></div>
            <div class="hbar" style="height:60%"></div>
            <div class="hbar" style="height:42%"></div>
            <div class="hbar" style="height:30%"></div>
            <div class="hbar you" style="height:20%"></div>
            <div class="hbar" style="height:10%"></div>
            <div class="hbar" style="height:5%"></div>
          </div>
          <div class="histogram-range">
            <span>0</span>
            <span>5,000</span>
          </div>
        </div>
      </div>

      <div class="stats">
        <article class="stat">
          <p class="stat-label">Distance</p>
          <p class="stat-value">125m</p>
        </article>
        <article class="stat">
          <p class="stat-label">Time</p>
          <p class="stat-value">00:47</p>
        </article>
        <article class="stat">
          <p class="stat-label">Percentile</p>
          <p class="stat-value">Top 9%</p>
        </article>
      </div>

      <button class="button" type="button">Next Round</button>
    </section>
  </main>
</body>
</html>
