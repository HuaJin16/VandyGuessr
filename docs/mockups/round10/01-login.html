<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VandyGuessr Round 10 - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand: #2e933c;
      --brand-dark: #236e2d;
      --ink: #1a1a1a;
      --muted: #5c6370;
      --line: #e5e2db;
      --line-strong: #c4c0b8;
      --surface: #ffffff;
      --canvas: #f7f5f0;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-sm: 3px 3px 0 0 rgba(0, 0, 0, 0.06);
      --ring: 0 0 0 3px rgba(46, 147, 60, 0.35);
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, sans-serif;
      color: var(--ink);
      background: var(--canvas);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      width: min(440px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      padding: 24px;
    }

    .brand {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      background: var(--brand);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    h1 {
      margin: 14px 0 0;
      font-size: 32px;
      line-height: 1.15;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .button {
      width: 100%;
      margin-top: 18px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--brand);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 14px;
      cursor: pointer;
      box-shadow: 0 4px 0 var(--brand-dark);
      transition: background 120ms var(--ease), transform 120ms var(--ease), box-shadow 120ms var(--ease);
    }

    .button:hover { background: #278234; }
    .button:active { transform: translateY(4px); box-shadow: 0 0 0 var(--brand-dark); }
    .button:focus-visible { outline: none; box-shadow: 0 4px 0 var(--brand-dark), var(--ring); }

    .meta {
      margin-top: 12px;
      font-size: 11px;
      color: var(--muted);
      font-family: Inter, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .links {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .link {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      text-decoration: none;
      background: #fff;
      transition: all 120ms var(--ease);
    }

    .link:hover {
      border-color: var(--brand);
      color: var(--brand);
      background: rgba(46, 147, 60, 0.1);
    }

    .link:focus-visible {
      outline: none;
      box-shadow: var(--ring);
    }

    @media (min-width: 700px) {
      .card { padding: 28px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">VG</div>
    <h1>Sign in to VandyGuessr</h1>
    <p>Use your Vanderbilt account to continue playing, track scores, and compare with friends.</p>

    <button class="button" type="button">Continue with Vanderbilt</button>

    <p class="meta">Inter + IBM Plex Mono / Simple card layout / Mobile first</p>

    <div class="links">
      <a class="link" href="00-foundation.html">Foundation</a>
      <a class="link" href="02-home.html">Home</a>
    </div>
  </main>
</body>
</html>
